<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Escala - Versão Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; }
        .calendar-grid { display: grid !important; grid-template-columns: repeat(7, 1fr) !important; gap: 8px; }
        @media print {
            @page { size: A4 landscape; margin: 0.5cm; }
            body, html { height: 100%; margin: 0; background-color: #fff !important; }
            .no-print { display: none !important; }
            #main-app-content, .container, #calendar-print-area { height: 100% !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; border: none !important; box-shadow: none !important; }
            .month-container { page-break-after: always; height: 98vh; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }
            .calendar-grid { flex-grow: 1; gap: 4px !important; }
            .calendar-day { border: 1px solid #cbd5e1 !important; border-radius: 0.5rem !important; }
        }
    </style>
</head>
<body class="bg-slate-200 text-slate-900">

    <div id="login-screen" class="fixed inset-0 bg-slate-200 flex items-center justify-center z-[100] no-print">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm border-2 border-slate-300">
            <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">Acesso à Escala</h2>
            <form id="login-form">
                <div class="mb-4 text-left">
                    <label class="block text-sm font-medium mb-1">Usuário</label>
                    <input type="text" id="username" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500" required placeholder="admin ou tecnico">
                </div>
                <div class="mb-6 text-left">
                    <label class="block text-sm font-medium mb-1">Senha</label>
                    <input type="password" id="password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
                </div>
                <button type="submit" id="login-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-lg">Entrar</button>
            </form>
        </div>
    </div>

    <div id="main-app-content" class="hidden">
        <div class="container mx-auto p-4 sm:p-6 lg:p-8 max-w-7xl">
            <header class="mb-8 no-print flex flex-col sm:flex-row sm:items-start sm:justify-between">
                <div class="text-center sm:text-left">
                    <h1 class="text-3xl sm:text-4xl font-bold text-slate-900">Gerador de Escala</h1>
                    <p class="text-slate-700 mt-2" id="status-text">Sincronizado na nuvem.</p>
                </div>
                <div class="flex gap-2 justify-center sm:justify-end mt-4 sm:mt-0 flex-wrap items-center">
                    <button id="clear-all-button" class="admin-only bg-orange-700 text-white font-bold py-2 px-4 rounded-lg text-xs shadow hover:bg-orange-800">Limpar Tudo</button>
                    <button id="change-password-button" class="admin-only bg-yellow-500 text-white font-bold py-2 px-4 rounded-lg text-xs shadow">Senha Admin</button>
                    <button id="history-button" class="admin-only bg-purple-600 text-white font-bold py-2 px-4 rounded-lg text-xs shadow">Histórico</button>
                    <button id="import-button" class="admin-only bg-blue-600 text-white font-bold py-2 px-4 rounded-lg text-xs shadow">Importar</button>
                    <button id="export-button" class="admin-only bg-teal-600 text-white font-bold py-2 px-4 rounded-lg text-xs shadow">Exportar</button>
                    <button id="edit-teams-button" class="admin-only bg-slate-400 text-white font-bold py-2 px-4 rounded-lg text-xs shadow hover:bg-slate-500">Duplas</button>
                    <button id="printButton" class="bg-green-600 text-white font-bold py-2 px-4 rounded-lg text-xs shadow">Imprimir</button>
                    <button id="logout-button" class="bg-red-600 text-white font-bold py-2 px-4 rounded-lg text-xs shadow">Sair</button>
                </div>
            </header>

            <input type="file" id="import-file-input" accept="application/json" class="hidden no-print">

            <div id="controls-section" class="admin-only bg-white p-6 rounded-2xl shadow-xl border border-slate-300 mb-8 flex flex-col sm:flex-row gap-4 items-center no-print">
                <div class="flex-1 w-full"><label class="block text-sm font-medium mb-1">Mês Início</label><select id="startMonth" class="w-full p-3 border rounded-lg"></select></div>
                <div class="flex-1 w-full"><label class="block text-sm font-medium mb-1">Mês Fim</label><select id="endMonth" class="w-full p-3 border rounded-lg"></select></div>
                <div class="flex-1 w-full"><label class="block text-sm font-medium mb-1">Ano</label><select id="year" class="w-full p-3 border rounded-lg"></select></div>
                <div class="flex flex-col gap-2">
                    <button id="generateButton" class="bg-blue-600 text-white font-bold py-3 px-6 rounded-lg shadow-lg">Gerar Escala</button>
                    <label class="text-xs font-medium flex items-center"><input id="clearDataCheckbox" type="checkbox" class="mr-2"> Limpar antes</label>
                </div>
            </div>

            <div id="swap-info" class="hidden bg-blue-100 border-l-4 border-blue-500 p-4 rounded-lg mb-8 no-print"><p id="swap-message" class="font-bold text-blue-800"></p><button id="cancelSwapButton" class="mt-2 bg-red-500 text-white py-1 px-3 rounded-lg text-sm">Cancelar Troca</button></div>

            <div id="calendar-print-area" class="bg-white p-6 rounded-2xl shadow-xl border border-slate-300">
                <div id="calendar-container"></div>
            </div>
        </div>
    </div>

    <div id="day-action-modal" class="modal fixed inset-0 bg-black/60 items-center justify-center p-4 hidden z-[70] no-print">
        <div class="modal-content bg-white p-6 rounded-2xl w-full max-w-sm text-center border-2 border-slate-300">
            <h3 id="day-action-modal-date" class="text-lg font-bold mb-4"></h3>
            <div class="space-y-3">
                <button id="action-swap-button" class="w-full bg-blue-500 text-white py-3 rounded-lg font-bold shadow">Trocar Plantão</button>
                <button id="action-add-member-button" class="w-full bg-green-500 text-white py-3 rounded-lg font-bold shadow">Adicionar Colaborador</button>
                <button id="action-replace-team-button" class="w-full bg-purple-500 text-white py-3 rounded-lg font-bold shadow">Substituir Dupla</button>
                <button id="action-remove-member-button" class="w-full bg-red-500 text-white py-3 rounded-lg font-bold shadow">Remover Colaborador</button>
                <button id="action-mark-event-button" class="w-full bg-orange-500 text-white py-3 rounded-lg font-bold shadow">Marcar Evento</button>
            </div>
            <button onclick="document.getElementById('day-action-modal').style.display='none'" class="mt-6 w-full bg-slate-200 py-2 rounded-lg font-bold">Fechar</button>
        </div>
    </div>

    <div id="edit-teams-modal" class="modal fixed inset-0 bg-black/60 items-center justify-center p-4 hidden z-[90] no-print">
        <div class="modal-content bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md text-center border border-slate-200">
            <h3 class="text-2xl font-bold text-slate-800 mb-2">Editar Duplas</h3>
            <textarea id="teams-textarea" class="w-full h-48 p-4 border rounded-xl mb-6 font-medium text-slate-700"></textarea>
            <div class="flex gap-4">
                <button onclick="document.getElementById('edit-teams-modal').style.display='none'" class="w-full bg-slate-100 py-3 rounded-xl">Cancelar</button>
                <button id="edit-teams-save" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">Salvar</button>
            </div>
        </div>
    </div>

    <div id="selection-modal" class="modal fixed inset-0 bg-black/60 items-center justify-center p-4 hidden z-[80] no-print">
        <div class="modal-content bg-white p-6 rounded-2xl w-full max-w-md border-2 border-slate-300">
            <h3 id="selection-title" class="font-bold mb-4 text-center"></h3>
            <div id="selection-list" class="space-y-2 max-h-60 overflow-y-auto mb-4 p-1"></div>
            <button onclick="document.getElementById('selection-modal').style.display='none'" class="w-full bg-slate-200 py-2 rounded-lg">Cancelar</button>
        </div>
    </div>

    <div id="mark-event-modal" class="modal fixed inset-0 bg-black/60 items-center justify-center p-4 hidden z-[80] no-print">
        <div class="modal-content bg-white p-6 rounded-2xl w-full max-w-md border-2 border-slate-300 text-center">
            <h3 class="font-bold mb-2">Eventos do Dia</h3>
            <div id="event-list-container" class="space-y-2 mb-4 border p-2 rounded max-h-40 overflow-y-auto bg-slate-50 text-left"></div>
            <div class="flex gap-2">
                <input type="text" id="event-text-input" class="flex-1 p-2 border rounded" placeholder="Novo evento">
                <button id="add-event-button" class="bg-green-600 text-white px-4 rounded font-bold shadow">Add</button>
            </div>
            <button onclick="document.getElementById('mark-event-modal').style.display='none'" class="mt-4 w-full bg-slate-200 py-2 rounded font-bold">Fechar</button>
        </div>
    </div>

    <div id="history-modal" class="modal fixed inset-0 bg-black/60 items-center justify-center p-4 hidden z-[100] no-print">
        <div class="modal-content bg-white rounded-2xl p-6 w-full max-w-2xl border-2 border-slate-300 flex flex-col max-h-[80vh]">
            <h3 class="font-bold text-xl mb-4 text-center">Histórico de Alterações</h3>
            <div id="history-list" class="overflow-y-auto space-y-2 border-t pt-2"></div>
            <button onclick="document.getElementById('history-modal').style.display='none'" class="mt-4 bg-slate-200 py-2 rounded-lg font-bold">Fechar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGE-crnO8PTmUylAK4bNLzn1T8bc1wZ3s",
            authDomain: "uc-escalas.firebaseapp.com",
            databaseURL: "https://uc-escalas-default-rtdb.firebaseio.com",
            projectId: "uc-escalas",
            storageBucket: "uc-escalas.firebasestorage.app",
            messagingSenderId: "930662517514",
            appId: "1:930662517514:web:67731ce7482864aec508f3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'escalaApp');

        let teams = ["Arthur Gabriel - Levy Silva", "André Luiz - William Rendeson", "Pedro Lemos - Artur Loiola", "Diego Lima - Eduardo Oliveira"];
        let schedule = {};
        let scheduleHistory = [];
        let adminPassword = "admin";
        let holidays = [];
        let currentUserRole = null; 
        let currentSelectedDate = null, swapState = { mode: null, firstDate: null };

        document.addEventListener('DOMContentLoaded', () => {
            populateSelectors();
            setupEventListeners();

            // Reforço no sistema de Login
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('login-btn');
                btn.textContent = "Conectando ao banco...";
                btn.disabled = true;

                try {
                    // Força o carregamento da senha salva no Firebase ANTES de checar o login
                    const snapshot = await get(dbRef);
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        teams = data.teams || teams;
                        schedule = data.schedule || {};
                        scheduleHistory = data.scheduleHistory || [];
                        adminPassword = data.adminPassword || "admin";
                    }

                    const u = document.getElementById('username').value.trim();
                    const p = document.getElementById('password').value.trim();

                    if (u === 'admin' && p === adminPassword) {
                        currentUserRole = 'admin';
                        iniciarApp();
                    } else if (u === 'tecnico' && p === 'UC@tec') {
                        currentUserRole = 'tecnico';
                        iniciarApp();
                    } else {
                        alert("Usuário ou senha incorretos!");
                        btn.textContent = "Entrar";
                        btn.disabled = false;
                    }
                } catch (error) {
                    console.error("Erro no Firebase:", error);
                    alert("Erro ao conectar. Verifique as Regras de Segurança do Firebase (devem estar .read: true e .write: true).");
                    btn.textContent = "Entrar";
                    btn.disabled = false;
                }
            });
        });

        function populateSelectors() {
            const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            months.forEach((m, i) => { 
                document.getElementById('startMonth').add(new Option(m, i)); 
                document.getElementById('endMonth').add(new Option(m, i)); 
            });
            const yr = new Date().getFullYear();
            for (let y = yr - 1; y <= yr + 2; y++) document.getElementById('year').add(new Option(y, y));
            document.getElementById('year').value = yr;
        }

        async function salvarDadosFirebase() {
            if (currentUserRole !== 'admin') return; 
            try {
                await set(dbRef, { teams, schedule, scheduleHistory, adminPassword });
            } catch (error) {
                console.error("Erro ao salvar", error);
            }
        }

        function addToHistory(action, desc) {
            scheduleHistory.unshift({ date: new Date().toLocaleString('pt-BR'), action, desc });
            salvarDadosFirebase();
        }

        function iniciarApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app-content').classList.remove('hidden');
            
            if (currentUserRole === 'tecnico') {
                document.querySelectorAll('.admin-only').forEach(el => el.classList.add('hidden'));
                document.getElementById('status-text').textContent = "Visualização Restrita: Apenas o mês corrente.";
                
                const now = new Date();
                document.getElementById('startMonth').value = now.getMonth();
                document.getElementById('endMonth').value = now.getMonth();
                document.getElementById('year').value = now.getFullYear();
            } else {
                if (Object.keys(schedule).length > 0) {
                    const dates = Object.keys(schedule).sort();
                    const first = new Date(dates[0]);
                    const last = new Date(dates[dates.length - 1]);
                    document.getElementById('startMonth').value = first.getMonth();
                    document.getElementById('endMonth').value = last.getMonth();
                    document.getElementById('year').value = first.getFullYear();
                }
            }

            // Escuta as alterações em tempo real no banco
            onValue(dbRef, (snapshot) => {
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    schedule = data.schedule || {};
                    teams = data.teams || teams;
                    scheduleHistory = data.scheduleHistory || [];
                    adminPassword = data.adminPassword || adminPassword;
                    renderCalendars();
                }
            });

            renderCalendars();
        }

        function renderCalendars() {
            const cont = document.getElementById('calendar-container'); cont.innerHTML = '';
            
            let startM = parseInt(document.getElementById('startMonth').value);
            let endM = parseInt(document.getElementById('endMonth').value);
            let yr = parseInt(document.getElementById('year').value);

            if (currentUserRole === 'tecnico') {
                const now = new Date();
                startM = now.getMonth();
                endM = now.getMonth();
                yr = now.getFullYear();
            }

            for (let m = startM; m <= endM; m++) {
                const mDiv = document.createElement('div'); mDiv.className = 'month-container';
                const monthName = document.getElementById('startMonth').options[m].text;
                mDiv.innerHTML = `<h2 class="calendar-title font-bold text-center text-slate-800 mb-6 uppercase">Escala de ${monthName} de ${yr}</h2>`;
                
                const grid = document.createElement('div');
                grid.className = 'calendar-grid';
                ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d => grid.innerHTML += `<div class="font-bold text-center text-slate-600 p-2 uppercase text-xs">${d}</div>`);

                const firstDay = new Date(yr, m, 1).getDay();
                const totalDays = new Date(yr, m + 1, 0).getDate();
                for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

                for (let d = 1; d <= totalDays; d++) {
                    const ds = `${yr}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const info = schedule[ds];
                    const cell = document.createElement('div');
                    cell.className = `calendar-day border-2 border-slate-300 rounded-lg p-2 min-h-[110px] flex flex-col cursor-pointer hover:border-blue-500 shadow-sm ${info?.isHoliday ? 'bg-green-50 border-green-400' : ''}`;
                    
                    if (currentUserRole === 'admin') {
                        cell.onclick = () => {
                            currentSelectedDate = ds;
                            if (swapState.mode === 'team') {
                                const t1 = schedule[swapState.firstDate]?.team, t2 = schedule[ds]?.team;
                                if (t1 && t2) {
                                    schedule[swapState.firstDate].team = t2; schedule[ds].team = t1;
                                    addToHistory("Troca", `Plantão de ${swapState.firstDate} trocado com ${ds}`);
                                    swapState = { mode: null, firstDate: null };
                                    document.getElementById('swap-info').classList.add('hidden');
                                    salvarDadosFirebase();
                                }
                            } else {
                                document.getElementById('day-action-modal-date').textContent = "Data: " + ds.split('-').reverse().join('/');
                                document.getElementById('day-action-modal').style.display='flex';
                            }
                        };
                    } else {
                        cell.classList.remove('cursor-pointer', 'hover:border-blue-500'); 
                    }
                    
                    let html = `<div class="text-center font-bold text-blue-600 text-lg">${d}</div>`;
                    if (info?.events) info.events.forEach(e => html += `<div class="bg-orange-100 text-orange-800 text-[10px] px-1 rounded mb-1 truncate border-l-2 border-orange-400 font-medium">${e}</div>`);
                    if (info?.team) html += `<div class="mt-auto text-center bg-slate-100 p-1 rounded-md border-t-2 border-slate-200 text-[11px] font-semibold">${info.team.join('<br>')}</div>`;
                    else if (info?.isHoliday) html += `<div class="mt-auto text-center bg-green-200 text-green-800 p-1 rounded-md text-[10px] font-bold">FERIADO<br>${info.name}</div>`;
                    
                    cell.innerHTML = html; grid.appendChild(cell);
                }
                mDiv.appendChild(grid); cont.appendChild(mDiv);
            }
        }

        window.confirmAction = (type, val) => {
            if(!schedule[currentSelectedDate]) schedule[currentSelectedDate] = {};
            if(type === 'add') { (schedule[currentSelectedDate].team = schedule[currentSelectedDate].team || []).push(val); addToHistory("Adição", `${val} em ${currentSelectedDate}`); }
            else if(type === 'replace') { schedule[currentSelectedDate].team = val.split(' - '); addToHistory("Substituição", `Novo time em ${currentSelectedDate}: ${val}`); }
            else if(type === 'remove') { schedule[currentSelectedDate].team = schedule[currentSelectedDate].team.filter(x => x !== val); addToHistory("Remoção", `${val} de ${currentSelectedDate}`); }
            document.getElementById('selection-modal').style.display='none'; 
            salvarDadosFirebase();
        };

        window.removeEvent = (i) => { 
            schedule[currentSelectedDate].events.splice(i, 1); 
            renderEvents(); 
            salvarDadosFirebase(); 
        };

        function renderEvents() {
            const l = document.getElementById('event-list-container'); l.innerHTML = '';
            (schedule[currentSelectedDate]?.events || []).forEach((e, i) => {
                l.innerHTML += `<div class="flex justify-between bg-white p-2 text-xs border rounded mb-1"><span>${e}</span><button onclick="window.removeEvent(${i})" class="text-red-500 font-bold">✖</button></div>`;
            });
        }

        function setupEventListeners() {
            document.getElementById('logout-button').onclick = () => location.reload();
            document.getElementById('printButton').onclick = () => window.print();

            document.getElementById('clear-all-button').onclick = () => {
                if(confirm("ATENÇÃO: Isso apagará permanentemente toda a escala na NUVEM. Continuar?")) {
                    schedule = {}; scheduleHistory = []; salvarDadosFirebase();
                }
            };

            document.getElementById('history-button').onclick = () => {
                document.getElementById('history-list').innerHTML = scheduleHistory.map(h => `<div class="text-xs p-2 border-b bg-slate-50"><b>[${h.date}]</b> <i>${h.action}:</i> ${h.desc}</div>`).join('') || "Sem registros.";
                document.getElementById('history-modal').style.display='flex';
            };

            document.getElementById('change-password-button').onclick = () => {
                const n = prompt("Nova senha Admin:"); 
                if(n) { adminPassword = n; salvarDadosFirebase(); alert("Senha alterada!"); }
            };

            document.getElementById('edit-teams-button').onclick = () => {
                document.getElementById('teams-textarea').value = teams.join('\n');
                document.getElementById('edit-teams-modal').style.display = 'flex';
            };

            document.getElementById('edit-teams-save').onclick = () => {
                teams = document.getElementById('teams-textarea').value.split('\n').filter(t => t.includes('-'));
                addToHistory("Equipes", "Lista de duplas editada."); 
                document.getElementById('edit-teams-modal').style.display = 'none';
                salvarDadosFirebase();
            };

            // Novas funções de Exportação e Importação
            document.getElementById('export-button').onclick = () => {
                const backupData = { teams, schedule, scheduleHistory, adminPassword };
                const blob = new Blob([JSON.stringify(backupData, null, 2)], {type:'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `backup_escala_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            document.getElementById('import-button').onclick = () => document.getElementById('import-file-input').click();
            document.getElementById('import-file-input').onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const fr = new FileReader();
                fr.onload = async () => {
                    try {
                        const data = JSON.parse(fr.result);
                        if(data.teams || data.schedule) {
                            teams = data.teams || teams;
                            schedule = data.schedule || {};
                            scheduleHistory = data.scheduleHistory || [];
                            adminPassword = data.adminPassword || adminPassword;
                            await salvarDadosFirebase();
                            renderCalendars();
                            alert("Backup importado com sucesso para a NUVEM!");
                        }
                    } catch(err) {
                        alert("Erro ao ler o arquivo JSON.");
                    }
                    e.target.value = ''; // reseta o input
                };
                fr.readAsText(file);
            };

            document.getElementById('action-swap-button').onclick = () => {
                document.getElementById('day-action-modal').style.display='none'; 
                swapState = { mode: 'team', firstDate: currentSelectedDate };
                document.getElementById('swap-info').classList.remove('hidden'); 
                document.getElementById('swap-message').textContent = "Modo Troca Ativado. Clique na data de destino.";
            };
            
            document.getElementById('cancelSwapButton').onclick = () => {
                swapState = { mode: null, firstDate: null }; 
                document.getElementById('swap-info').classList.add('hidden');
            }

            document.getElementById('action-add-member-button').onclick = () => {
                document.getElementById('day-action-modal').style.display='none';
                const all = [...new Set(teams.flatMap(t => t.split(' - ')))];
                document.getElementById('selection-title').textContent = "Adicionar Colaborador";
                document.getElementById('selection-list').innerHTML = all.map(c => `<button onclick="window.confirmAction('add', '${c}')" class="w-full text-left p-3 border rounded hover:bg-green-50 font-bold">＋ ${c}</button>`).join('');
                document.getElementById('selection-modal').style.display='flex';
            };

            document.getElementById('action-replace-team-button').onclick = () => {
                document.getElementById('day-action-modal').style.display='none';
                document.getElementById('selection-title').textContent = "Substituir Dupla";
                document.getElementById('selection-list').innerHTML = teams.map(t => `<button onclick="window.confirmAction('replace', '${t}')" class="w-full text-left p-3 border rounded hover:bg-purple-50 font-bold">🔁 ${t}</button>`).join('');
                document.getElementById('selection-modal').style.display='flex';
            };

            document.getElementById('action-remove-member-button').onclick = () => {
                document.getElementById('day-action-modal').style.display='none';
                const cur = schedule[currentSelectedDate]?.team || [];
                document.getElementById('selection-title').textContent = "Remover do Plantão";
                document.getElementById('selection-list').innerHTML = cur.map(c => `<button onclick="window.confirmAction('remove', '${c}')" class="w-full text-left p-3 border rounded hover:bg-red-50 text-red-600 font-bold">✖ ${c}</button>`).join('');
                document.getElementById('selection-modal').style.display='flex';
            };

            document.getElementById('action-mark-event-button').onclick = () => { 
                document.getElementById('day-action-modal').style.display='none'; 
                renderEvents(); 
                document.getElementById('mark-event-modal').style.display='flex'; 
            };

            document.getElementById('add-event-button').onclick = () => {
                const t = document.getElementById('event-text-input').value; if (!t) return;
                if (!schedule[currentSelectedDate]) schedule[currentSelectedDate] = {};
                if (!schedule[currentSelectedDate].events) schedule[currentSelectedDate].events = [];
                schedule[currentSelectedDate].events.push(t);
                addToHistory("Evento", `${t} em ${currentSelectedDate}`); 
                document.getElementById('event-text-input').value = ""; 
                renderEvents(); 
                salvarDadosFirebase();
            };

            document.getElementById('generateButton').onclick = async () => {
                const startM = parseInt(document.getElementById('startMonth').value);
                const endM = parseInt(document.getElementById('endMonth').value);
                const yr = parseInt(document.getElementById('year').value);
                
                if (document.getElementById('clearDataCheckbox').checked) { schedule = {}; scheduleHistory = []; }
                
                try {
                    const r = await fetch(`https://brasilapi.com.br/api/feriados/v1/${yr}`);
                    const h = await r.json(); holidays = h.map(x => ({ date: x.date, name: x.name }));
                    holidays.push({ date: `${yr}-03-19`, name: 'São José' }, { date: `${yr}-03-25`, name: 'Data Magna CE' });
                } catch (e) {}

                const dates = [];
                for (let m = startM; m <= endM; m++) {
                    const days = new Date(yr, m + 1, 0).getDate();
                    for (let d = 1; d <= days; d++) dates.push(new Date(yr, m, d));
                }

                dates.forEach(d => {
                    const s = d.toISOString().split('T')[0];
                    const h = holidays.find(f => f.date === s);
                    if (schedule[s]) delete schedule[s].team;
                    if (h) schedule[s] = { ...(schedule[s] || {}), isHoliday: true, name: h.name };
                });

                const dutyDays = dates.filter(d => (d.getDay() === 0 || d.getDay() === 6) && !holidays.find(h => h.date === d.toISOString().split('T')[0]));
                let idx = 0;
                dutyDays.forEach(curDate => {
                    const dateStr = curDate.toISOString().split('T')[0];
                    const forbidden = new Set();
                    for (let i = 1; i <= 8; i++) {
                        const checkD = new Date(curDate); checkD.setDate(checkD.getDate() - i);
                        const past = (schedule[checkD.toISOString().split('T')[0]]?.team || []).join(' - ');
                        if (past) forbidden.add(past);
                    }
                    let assigned = false;
                    for (let a = 0; a < teams.length; a++) {
                        const cand = teams[idx];
                        if (!forbidden.has(cand)) { schedule[dateStr] = { ...(schedule[dateStr] || {}), team: cand.split(' - ') }; assigned = true; idx = (idx + 1) % teams.length; break; }
                        idx = (idx + 1) % teams.length;
                    }
                    if (!assigned) { schedule[dateStr] = { ...(schedule[dateStr] || {}), team: teams[idx].split(' - ') }; idx = (idx + 1) % teams.length; }
                });
                addToHistory("Geração", "Escala automática gerada."); 
            };
        }
    </script>
</body>
</html>
