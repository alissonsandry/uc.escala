<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Escala - Versão Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; }
        
        /* Grid responsivo nativo */
        .calendar-grid { 
            display: grid !important; 
            grid-template-columns: repeat(7, minmax(0, 1fr)) !important; 
            gap: 4px; 
        }

        @media (min-width: 640px) {
            .calendar-grid { gap: 8px; }
        }

        @media print {
            @page { size: A4 landscape; margin: 0.5cm; }
            body, html { height: 100%; margin: 0; background-color: #fff !important; }
            .no-print { display: none !important; }
            #main-app-content, .container, #calendar-print-area { height: 100% !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; border: none !important; box-shadow: none !important; }
            .month-container { page-break-after: always; height: 98vh; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }
            .calendar-grid { flex-grow: 1; gap: 4px !important; }
            .calendar-day { border: 1px solid #cbd5e1 !important; border-radius: 0.5rem !important; min-height: auto !important; }
        }
    </style>
</head>
<body class="bg-slate-200 text-slate-900">

    <div id="login-screen" class="fixed inset-0 bg-slate-200 flex items-center justify-center z-[100] p-4 no-print">
        <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-2xl w-full max-w-sm border-2 border-slate-300">
            <h2 class="text-xl sm:text-2xl font-bold text-center text-slate-800 mb-6">Acesso à Escala</h2>
            <form id="login-form">
                <div class="mb-4 text-left">
                    <label class="block text-sm font-medium mb-1">Usuário</label>
                    <input type="text" id="username" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500" required placeholder="admin ou tecnico">
                </div>
                <div class="mb-6 text-left">
                    <label class="block text-sm font-medium mb-1">Senha</label>
                    <input type="password" id="password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
                </div>
                <button type="submit" id="login-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-lg">Entrar</button>
            </form>
        </div>
    </div>

    <div id="main-app-content" class="hidden">
        <div class="container mx-auto p-2 sm:p-4 lg:p-8 max-w-7xl">
            <header class="mb-6 sm:mb-8 no-print flex flex-col lg:flex-row lg:items-start lg:justify-between gap-4">
                <div class="text-center lg:text-left">
                    <h1 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-slate-900">Gerador de Escala</h1>
                    <p class="text-xs sm:text-sm text-slate-700 mt-1 sm:mt-2" id="status-text">Sincronizado na nuvem.</p>
                </div>
                <div class="flex gap-2 justify-center lg:justify-end flex-wrap items-center">
                    <button id="clear-all-button" class="admin-only bg-orange-700 text-white font-bold py-2 px-3 sm:px-4 rounded-lg text-[10px] sm:text-xs shadow hover:bg-orange-800">Limpar Tudo</button>
                    <button id="change-password-button" class="admin-only bg-yellow-500 text-white font-bold py-2 px-3 sm:px-4 rounded-lg text-[10px] sm:text-xs shadow hover:bg-yellow-600">Senha Admin</button>
                    <button id="history-button" class="admin-only bg-purple-600 text-white font-bold py-2 px-3 sm:px-4 rounded-lg text-[10px] sm:text-xs shadow hover:bg-purple-700">Histórico</button>
                    <button id="import-button" class="admin-only bg-blue-600 text-white font-bold py-2 px-3 sm:px-4 rounded-lg text-[10px] sm:text-xs shadow hover:bg-blue-700">Importar</button>
                    <button id="export-button" class="admin-only bg-teal-600 text-white font-bold py-2 px-3 sm:px-4 rounded-lg text-[10px] sm:text-xs shadow hover:bg-teal-700">Exportar</button>
                    <button id="edit-teams-button" class="admin-only bg-slate-500 text-white font-bold py-2 px-3 sm:px-4 rounded-lg text-[10px] sm:text-xs shadow hover:bg-slate-600">Duplas</button>
                    <button id="printButton" class="admin-only bg-green-600 text-white font-bold py-2 px-3 sm:px-4 rounded-lg text-[10px] sm:text-xs shadow hover:bg-green-700">Imprimir</button>
                    <button id="logout-button" class="bg-red-600 text-white font-bold py-2 px-3 sm:px-4 rounded-lg text-[10px] sm:text-xs shadow hover:bg-red-700">Sair</button>
                </div>
            </header>

            <input type="file" id="import-file-input" accept="application/json" class="hidden no-print">

            <div id="controls-section" class="admin-only bg-white p-4 sm:p-6 rounded-2xl shadow-xl border border-slate-300 mb-6 sm:mb-8 flex flex-col md:flex-row gap-4 items-center no-print">
                <div class="flex-1 w-full"><label class="block text-xs sm:text-sm font-medium mb-1">Mês Início</label><select id="startMonth" class="w-full p-2 sm:p-3 border rounded-lg text-sm"></select></div>
                <div class="flex-1 w-full"><label class="block text-xs sm:text-sm font-medium mb-1">Mês Fim</label><select id="endMonth" class="w-full p-2 sm:p-3 border rounded-lg text-sm"></select></div>
                <div class="flex-1 w-full"><label class="block text-xs sm:text-sm font-medium mb-1">Ano</label><select id="year" class="w-full p-2 sm:p-3 border rounded-lg text-sm"></select></div>
                <div class="flex flex-col gap-2 w-full md:w-auto mt-2 md:mt-0">
                    <button id="generateButton" class="w-full bg-blue-600 text-white font-bold py-2 sm:py-3 px-4 sm:px-6 rounded-lg shadow-lg text-sm sm:text-base">Gerar Escala</button>
                    <label class="text-xs font-medium flex items-center justify-center md:justify-start cursor-pointer"><input id="clearDataCheckbox" type="checkbox" class="mr-2"> Limpar antes</label>
                </div>
            </div>

            <div id="swap-info" class="hidden bg-blue-100 border-l-4 border-blue-500 p-3 sm:p-4 rounded-lg mb-6 sm:mb-8 no-print flex flex-col sm:flex-row items-center justify-between gap-2">
                <p id="swap-message" class="font-bold text-blue-800 text-sm text-center sm:text-left"></p>
                <button id="cancelSwapButton" class="bg-red-500 text-white py-1.5 px-4 rounded-lg text-sm font-bold w-full sm:w-auto">Cancelar Troca</button>
            </div>

            <div id="calendar-print-area" class="bg-white p-2 sm:p-6 rounded-xl sm:rounded-2xl shadow-xl border border-slate-300 overflow-x-auto">
                <div id="calendar-container" class="min-w-[320px]"></div>
            </div>
        </div>
    </div>

    <div id="day-action-modal" class="modal fixed inset-0 bg-black/60 items-center justify-center p-4 hidden z-[70] no-print">
        <div class="modal-content bg-white p-5 sm:p-6 rounded-2xl w-full max-w-sm text-center border-2 border-slate-300">
            <h3 id="day-action-modal-date" class="text-base sm:text-lg font-bold mb-4"></h3>
            <div class="space-y-2 sm:space-y-3">
                <button id="action-swap-button" class="w-full bg-blue-500 text-white py-2.5 sm:py-3 rounded-lg font-bold shadow text-sm sm:text-base">Trocar Plantão</button>
                <button id="action-add-member-button" class="w-full bg-green-500 text-white py-2.5 sm:py-3 rounded-lg font-bold shadow text-sm sm:text-base">Adicionar Colaborador</button>
                <button id="action-replace-team-button" class="w-full bg-purple-500 text-white py-2.5 sm:py-3 rounded-lg font-bold shadow text-sm sm:text-base">Substituir Dupla</button>
                <button id="action-remove-member-button" class="w-full bg-red-500 text-white py-2.5 sm:py-3 rounded-lg font-bold shadow text-sm sm:text-base">Remover Colaborador</button>
                <button id="action-mark-event-button" class="w-full bg-orange-500 text-white py-2.5 sm:py-3 rounded-lg font-bold shadow text-sm sm:text-base">Marcar Evento</button>
            </div>
            <button onclick="document.getElementById('day-action-modal').style.display='none'" class="mt-4 sm:mt-6 w-full bg-slate-200 py-2.5 rounded-lg font-bold text-sm sm:text-base">Fechar</button>
        </div>
    </div>

    <div id="edit-teams-modal" class="modal fixed inset-0 bg-black/60 items-center justify-center p-4 hidden z-[90] no-print">
        <div class="modal-content bg-white rounded-2xl sm:rounded-3xl shadow-2xl p-5 sm:p-8 w-full max-w-md text-center border border-slate-200">
            <h3 class="text-xl sm:text-2xl font-bold text-slate-800 mb-2">Editar Duplas</h3>
            <textarea id="teams-textarea" class="w-full h-40 sm:h-48 p-3 sm:p-4 border rounded-xl mb-4 sm:mb-6 font-medium text-slate-700 text-sm sm:text-base"></textarea>
            <div class="flex gap-3 sm:gap-4">
                <button onclick="document.getElementById('edit-teams-modal').style.display='none'" class="w-full bg-slate-100 py-2.5 sm:py-3 rounded-xl font-medium">Cancelar</button>
                <button id="edit-teams-save" class="w-full bg-blue-600 text-white py-2.5 sm:py-3 rounded-xl font-bold shadow-lg">Salvar</button>
            </div>
        </div>
    </div>

    <div id="selection-modal" class="modal fixed inset-0 bg-black/60 items-center justify-center p-4 hidden z-[80] no-print">
        <div class="modal-content bg-white p-5 sm:p-6 rounded-2xl w-full max-w-md border-2 border-slate-300">
            <h3 id="selection-title" class="font-bold mb-4 text-center text-sm sm:text-base"></h3>
            <div id="selection-list" class="space-y-2 max-h-60 overflow-y-auto mb-4 p-1 text-sm sm:text-base"></div>
            <button onclick="document.getElementById('selection-modal').style.display='none'" class="w-full bg-slate-200 py-2.5 rounded-lg font-bold text-sm sm:text-base">Cancelar</button>
        </div>
    </div>

    <div id="mark-event-modal" class="modal fixed inset-0 bg-black/60 items-center justify-center p-4 hidden z-[80] no-print">
        <div class="modal-content bg-white p-5 sm:p-6 rounded-2xl w-full max-w-md border-2 border-slate-300 text-center">
            <h3 class="font-bold mb-2 text-sm sm:text-base">Eventos do Dia</h3>
            <div id="event-list-container" class="space-y-2 mb-4 border p-2 rounded max-h-40 overflow-y-auto bg-slate-50 text-left text-xs sm:text-sm"></div>
            <div class="flex gap-2">
                <input type="text" id="event-text-input" class="flex-1 p-2 border rounded text-sm" placeholder="Novo evento">
                <button id="add-event-button" class="bg-green-600 text-white px-4 py-2 rounded font-bold shadow text-sm">Add</button>
            </div>
            <button onclick="document.getElementById('mark-event-modal').style.display='none'" class="mt-4 w-full bg-slate-200 py-2.5 rounded font-bold text-sm sm:text-base">Fechar</button>
        </div>
    </div>

    <div id="history-modal" class="modal fixed inset-0 bg-black/60 items-center justify-center p-4 hidden z-[100] no-print">
        <div class="modal-content bg-white rounded-2xl p-5 sm:p-6 w-full max-w-2xl border-2 border-slate-300 flex flex-col max-h-[80vh]">
            <h3 class="font-bold text-lg sm:text-xl mb-4 text-center">Histórico de Alterações</h3>
            <div id="history-list" class="overflow-y-auto space-y-2 border-t pt-2 text-xs sm:text-sm"></div>
            <button onclick="document.getElementById('history-modal').style.display='none'" class="mt-4 bg-slate-200 py-2.5 rounded-lg font-bold text-sm sm:text-base">Fechar</button>
        </div>
    </div>

    <div id="tecnico-alert-modal" class="modal fixed inset-0 bg-black/60 items-center justify-center p-4 hidden z-[110] no-print">
        <div class="modal-content bg-white p-6 rounded-2xl w-full max-w-sm text-center border-t-8 border-yellow-400 shadow-2xl">
            <div class="text-yellow-500 mb-4 flex justify-center">
                <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            <h3 class="font-bold text-xl mb-2 text-slate-800">Aviso Importante</h3>
            <p class="text-sm text-slate-600 mb-6">A escala poderá ter mudança em caso de feriados ou falta de programação de atividades.</p>
            <button onclick="document.getElementById('tecnico-alert-modal').classList.add('hidden'); document.getElementById('tecnico-alert-modal').classList.remove('flex');" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition shadow-md">Ciente</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGE-crnO8PTmUylAK4bNLzn1T8bc1wZ3s",
            authDomain: "uc-escalas.firebaseapp.com",
            databaseURL: "https://uc-escalas-default-rtdb.firebaseio.com",
            projectId: "uc-escalas",
            storageBucket: "uc-escalas.firebasestorage.app",
            messagingSenderId: "930662517514",
            appId: "1:930662517514:web:67731ce7482864aec508f3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'escalaApp');

        let teams = ["Arthur Gabriel - Levy Silva", "André Luiz - William Rendeson", "Pedro Lemos - Artur Loiola", "Diego Lima - Eduardo Oliveira"];
        let schedule = {};
        let scheduleHistory = [];
        let adminPassword = "admin";
        let holidays = [];
        let currentUserRole = null; 
        let currentSelectedDate = null, swapState = { mode: null, firstDate: null };

        function toLocalYYYYMMDD(d) {
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            populateSelectors();
            setupEventListeners();

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('login-btn');
                btn.textContent = "Conectando ao banco...";
                btn.disabled = true;

                try {
                    const snapshot = await get(dbRef);
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        teams = data.teams || teams;
                        schedule = data.schedule || {};
                        scheduleHistory = data.scheduleHistory || [];
                        adminPassword = data.adminPassword || "admin";
                    }

                    const u = document.getElementById('username').value.trim();
                    const p = document.getElementById('password').value.trim();

                    if (u === 'admin' && p === adminPassword) {
                        currentUserRole = 'admin';
                        iniciarApp();
                    } else if (u === 'tecnico' && p === 'UC@tec') {
                        currentUserRole = 'tecnico';
                        iniciarApp();
                    } else {
                        alert("Usuário ou senha incorretos!");
                        btn.textContent = "Entrar";
                        btn.disabled = false;
                    }
                } catch (error) {
                    console.error("Erro no Firebase:", error);
                    alert("Erro ao conectar ao banco de dados.");
                    btn.textContent = "Entrar";
                    btn.disabled = false;
                }
            });
        });

        function populateSelectors() {
            const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            months.forEach((m, i) => { 
                document.getElementById('startMonth').add(new Option(m, i)); 
                document.getElementById('endMonth').add(new Option(m, i)); 
            });
            const yr = new Date().getFullYear();
            for (let y = yr - 1; y <= yr + 2; y++) document.getElementById('year').add(new Option(y, y));
            document.getElementById('year').value = yr;
        }

        async function salvarDadosFirebase() {
            if (currentUserRole !== 'admin') return; 
            try {
                const dataToSave = JSON.parse(JSON.stringify({ teams, schedule, scheduleHistory, adminPassword }));
                await set(dbRef, dataToSave);
            } catch (error) {
                console.error("Erro ao salvar", error);
                alert("ERRO AO SALVAR NA NUVEM! Verifique as permissões de Escrita no Firebase (aba Regras).");
            }
        }

        function addToHistory(action, desc) {
            scheduleHistory.unshift({ date: new Date().toLocaleString('pt-BR'), action, desc });
            salvarDadosFirebase();
        }

        function iniciarApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app-content').classList.remove('hidden');
            
            if (currentUserRole === 'tecnico') {
                document.querySelectorAll('.admin-only').forEach(el => el.classList.add('hidden'));
                document.getElementById('status-text').textContent = "Visualização Restrita: Apenas o mês corrente.";
                
                const now = new Date();
                document.getElementById('startMonth').value = now.getMonth();
                document.getElementById('endMonth').value = now.getMonth();
                document.getElementById('year').value = now.getFullYear();
                
                // Abre o popup do técnico manipulando as classes (Garante funcionamento Desktop e Mobile)
                const modalAlerta = document.getElementById('tecnico-alert-modal');
                modalAlerta.classList.remove('hidden');
                modalAlerta.classList.add('flex');
                
            } else {
                if (Object.keys(schedule).length > 0) {
                    const dates = Object.keys(schedule).sort();
                    const firstDateParts = dates[0].split('-');
                    const lastDateParts = dates[dates.length - 1].split('-');
                    
                    document.getElementById('startMonth').value = parseInt(firstDateParts[1]) - 1;
                    document.getElementById('endMonth').value = parseInt(lastDateParts[1]) - 1;
                    document.getElementById('year').value = firstDateParts[0];
                }
            }

            onValue(dbRef, (snapshot) => {
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    schedule = data.schedule || {};
                    teams = data.teams || teams;
                    scheduleHistory = data.scheduleHistory || [];
                    adminPassword = data.adminPassword || adminPassword;
                    renderCalendars();
                }
            });

            renderCalendars();
        }

        function renderCalendars() {
            const cont = document.getElementById('calendar-container'); cont.innerHTML = '';
            
            let startM = parseInt(document.getElementById('startMonth').value);
            let endM = parseInt(document.getElementById('endMonth').value);
            let yr = parseInt(document.getElementById('year').value);

            if (currentUserRole === 'tecnico') {
                const now = new Date();
                startM = now.getMonth();
                endM = now.getMonth();
                yr = now.getFullYear();
            }

            for (let m = startM; m <= endM; m++) {
                const mDiv = document.createElement('div'); mDiv.className = 'month-container mt-2 sm:mt-4';
                const monthName = document.getElementById('startMonth').options[m].text;
                mDiv.innerHTML = `<h2 class="calendar-title font-bold text-center text-slate-800 mb-3 sm:mb-6 uppercase text-sm sm:text-lg">Escala de ${monthName} de ${yr}</h2>`;
                
                const grid = document.createElement('div');
                grid.className = 'calendar-grid';
                ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d => grid.innerHTML += `<div class="font-bold text-center text-slate-600 p-1 sm:p-2 uppercase text-[10px] sm:text-xs truncate">${d}</div>`);

                const firstDay = new Date(yr, m, 1).getDay();
                const totalDays = new Date(yr, m + 1, 0).getDate();
                for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

                for (let d = 1; d <= totalDays; d++) {
                    const ds = `${yr}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const info = schedule[ds];
                    const cell = document.createElement('div');
                    
                    cell.className = `calendar-day border sm:border-2 border-slate-300 rounded sm:rounded-lg p-1 sm:p-2 min-h-[85px] sm:min-h-[110px] flex flex-col ${currentUserRole === 'admin' ? 'cursor-pointer hover:border-blue-500 hover:shadow-md transition-shadow' : ''} shadow-sm ${info?.isHoliday ? 'bg-green-50 border-green-400' : 'bg-white'}`;
                    
                    if (currentUserRole === 'admin') {
                        cell.onclick = () => {
                            currentSelectedDate = ds;
                            if (swapState.mode === 'team') {
                                const t1 = schedule[swapState.firstDate]?.team, t2 = schedule[ds]?.team;
                                if (t1 && t2) {
                                    schedule[swapState.firstDate].team = t2; schedule[ds].team = t1;
                                    addToHistory("Troca", `Plantão de ${swapState.firstDate} trocado com ${ds}`);
                                    swapState = { mode: null, firstDate: null };
                                    document.getElementById('swap-info').classList.add('hidden');
                                }
                            } else {
                                document.getElementById('day-action-modal-date').textContent = "Data: " + ds.split('-').reverse().join('/');
                                document.getElementById('day-action-modal').style.display='flex';
                            }
                        };
                    }
                    
                    let html = `<div class="text-center font-bold text-blue-600 text-sm sm:text-lg leading-none mb-1 sm:mb-2">${d}</div>`;
                    
                    if (info?.events) {
                        info.events.forEach(e => html += `<div class="bg-orange-100 text-orange-800 text-[9px] sm:text-[10px] px-1 rounded mb-1 truncate border-l-2 border-orange-400 font-medium">${e}</div>`);
                    }
                    
                    if (info?.team) {
                        const teamFormatted = info.team.map(t => t.replace(/ - /g, '<br>')).join('<hr class="my-0.5 sm:my-1 border-slate-300">');
                        html += `<div class="mt-auto text-center bg-slate-100 p-0.5 sm:p-1 rounded sm:rounded-md border-t border-slate-200 text-[9px] sm:text-[11px] font-semibold break-words leading-tight sm:leading-snug w-full overflow-hidden">${teamFormatted}</div>`;
                    }
                    else if (info?.isHoliday) {
                        html += `<div class="mt-auto text-center bg-green-200 text-green-800 p-0.5 sm:p-1 rounded sm:rounded-md text-[8px] sm:text-[10px] font-bold leading-tight">FERIADO<br><span class="font-normal truncate block text-[7px] sm:text-[9px]">${info.name}</span></div>`;
                    }
                    
                    cell.innerHTML = html; 
                    grid.appendChild(cell);
                }
                mDiv.appendChild(grid); cont.appendChild(mDiv);
            }
        }

        window.confirmAction = (type, val) => {
            if(!schedule[currentSelectedDate]) schedule[currentSelectedDate] = {};
            if(type === 'add') { (schedule[currentSelectedDate].team = schedule[currentSelectedDate].team || []).push(val); addToHistory("Adição", `${val} em ${currentSelectedDate}`); }
            else if(type === 'replace') { schedule[currentSelectedDate].team = val.split(' - '); addToHistory("Substituição", `Novo time em ${currentSelectedDate}: ${val}`); }
            else if(type === 'remove') { schedule[currentSelectedDate].team = schedule[currentSelectedDate].team.filter(x => x !== val); addToHistory("Remoção", `${val} de ${currentSelectedDate}`); }
            document.getElementById('selection-modal').style.display='none'; 
        };

        window.removeEvent = (i) => { 
            schedule[currentSelectedDate].events.splice(i, 1); 
            renderEvents(); 
            salvarDadosFirebase(); 
        };

        function renderEvents() {
            const l = document.getElementById('event-list-container'); l.innerHTML = '';
            (schedule[currentSelectedDate]?.events || []).forEach((e, i) => {
                l.innerHTML += `<div class="flex justify-between items-center bg-white p-2 text-sm border rounded mb-1"><span>${e}</span><button onclick="window.removeEvent(${i})" class="text-red-500 font-bold ml-2">✖</button></div>`;
            });
        }

        function setupEventListeners() {
            document.getElementById('logout-button').onclick = () => location.reload();
            document.getElementById('printButton').onclick = () => window.print();

            document.getElementById('clear-all-button').onclick = () => {
                if(confirm("ATENÇÃO: Isso apagará permanentemente toda a escala na NUVEM. Continuar?")) {
                    schedule = {}; scheduleHistory = []; salvarDadosFirebase();
                }
            };

            document.getElementById('history-button').onclick = () => {
                document.getElementById('history-list').innerHTML = scheduleHistory.map(h => `<div class="p-2 border-b bg-slate-50"><b>[${h.date}]</b> <i>${h.action}:</i> ${h.desc}</div>`).join('') || "<div class='p-2 text-center text-slate-500'>Sem registros.</div>";
                document.getElementById('history-modal').style.display='flex';
            };

            document.getElementById('change-password-button').onclick = () => {
                const n = prompt("Nova senha Admin:"); 
                if(n) { adminPassword = n; salvarDadosFirebase(); alert("Senha alterada!"); }
            };

            document.getElementById('edit-teams-button').onclick = () => {
                document.getElementById('teams-textarea').value = teams.join('\n');
                document.getElementById('edit-teams-modal').style.display = 'flex';
            };

            document.getElementById('edit-teams-save').onclick = () => {
                teams = document.getElementById('teams-textarea').value.split('\n').filter(t => t.includes('-'));
                addToHistory("Equipes", "Lista de duplas editada."); 
                document.getElementById('edit-teams-modal').style.display = 'none';
            };

            document.getElementById('export-button').onclick = () => {
                const backupData = { teams, schedule, scheduleHistory, adminPassword };
                const blob = new Blob([JSON.stringify(backupData, null, 2)], {type:'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `backup_escala_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            document.getElementById('import-button').onclick = () => document.getElementById('import-file-input').click();
            document.getElementById('import-file-input').onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const fr = new FileReader();
                fr.onload = async () => {
                    try {
                        const data = JSON.parse(fr.result);
                        if(data.teams || data.schedule) {
                            teams = data.teams || teams;
                            schedule = data.schedule || {};
                            scheduleHistory = data.scheduleHistory || [];
                            adminPassword = data.adminPassword || adminPassword;
                            
                            renderCalendars(); 
                            await salvarDadosFirebase();
                            alert("Backup importado e salvo na nuvem com sucesso!");
                        }
                    } catch(err) {
                        alert("Erro ao ler o arquivo JSON.");
                    }
                    e.target.value = ''; 
                };
                fr.readAsText(file);
            };

            document.getElementById('action-swap-button').onclick = () => {
                document.getElementById('day-action-modal').style.display='none'; 
                swapState = { mode: 'team', firstDate: currentSelectedDate };
                document.getElementById('swap-info').classList.remove('hidden'); 
                document.getElementById('swap-message').textContent = "Modo Troca Ativado. Clique na data de destino para inverter os plantonistas.";
            };
            
            document.getElementById('cancelSwapButton').onclick = () => {
                swapState = { mode: null, firstDate: null }; 
                document.getElementById('swap-info').classList.add('hidden');
            }

            document.getElementById('action-add-member-button').onclick = () => {
                document.getElementById('day-action-modal').style.display='none';
                const all = [...new Set(teams.flatMap(t => t.split(' - ')))];
                document.getElementById('selection-title').textContent = "Adicionar Colaborador";
                document.getElementById('selection-list').innerHTML = all.map(c => `<button onclick="window.confirmAction('add', '${c}')" class="w-full text-left p-3 border rounded hover:bg-green-50 font-bold transition-colors">＋ ${c}</button>`).join('');
                document.getElementById('selection-modal').style.display='flex';
            };

            document.getElementById('action-replace-team-button').onclick = () => {
                document.getElementById('day-action-modal').style.display='none';
                document.getElementById('selection-title').textContent = "Substituir Dupla";
                document.getElementById('selection-list').innerHTML = teams.map(t => `<button onclick="window.confirmAction('replace', '${t}')" class="w-full text-left p-3 border rounded hover:bg-purple-50 font-bold transition-colors">🔁 ${t}</button>`).join('');
                document.getElementById('selection-modal').style.display='flex';
            };

            document.getElementById('action-remove-member-button').onclick = () => {
                document.getElementById('day-action-modal').style.display='none';
                const cur = schedule[currentSelectedDate]?.team || [];
                document.getElementById('selection-title').textContent = "Remover do Plantão";
                document.getElementById('selection-list').innerHTML = cur.map(c => `<button onclick="window.confirmAction('remove', '${c}')" class="w-full text-left p-3 border rounded hover:bg-red-50 text-red-600 font-bold transition-colors">✖ ${c}</button>`).join('');
                document.getElementById('selection-modal').style.display='flex';
            };

            document.getElementById('action-mark-event-button').onclick = () => { 
                document.getElementById('day-action-modal').style.display='none'; 
                renderEvents(); 
                document.getElementById('mark-event-modal').style.display='flex'; 
            };

            document.getElementById('add-event-button').onclick = () => {
                const t = document.getElementById('event-text-input').value; if (!t) return;
                if (!schedule[currentSelectedDate]) schedule[currentSelectedDate] = {};
                if (!schedule[currentSelectedDate].events) schedule[currentSelectedDate].events = [];
                schedule[currentSelectedDate].events.push(t);
                addToHistory("Evento", `${t} em ${currentSelectedDate}`); 
                document.getElementById('event-text-input').value = ""; 
                renderEvents(); 
            };

            document.getElementById('generateButton').onclick = async () => {
                const startM = parseInt(document.getElementById('startMonth').value);
                const endM = parseInt(document.getElementById('endMonth').value);
                const yr = parseInt(document.getElementById('year').value);
                
                if (document.getElementById('clearDataCheckbox').checked) { schedule = {}; scheduleHistory = []; }
                
                try {
                    const r = await fetch(`https://brasilapi.com.br/api/feriados/v1/${yr}`);
                    const h = await r.json(); holidays = h.map(x => ({ date: x.date, name: x.name }));
                    holidays.push({ date: `${yr}-03-19`, name: 'São José' }, { date: `${yr}-03-25`, name: 'Data Magna CE' });
                } catch (e) {}

                const dates = [];
                for (let m = startM; m <= endM; m++) {
                    const days = new Date(yr, m + 1, 0).getDate();
                    for (let d = 1; d <= days; d++) dates.push(new Date(yr, m, d));
                }

                dates.forEach(curDate => {
                    const s = toLocalYYYYMMDD(curDate);
                    const h = holidays.find(f => f.date === s);
                    if (schedule[s]) delete schedule[s].team;
                    if (h) schedule[s] = { ...(schedule[s] || {}), isHoliday: true, name: h.name };
                });

                const dutyDays = dates.filter(d => (d.getDay() === 0 || d.getDay() === 6) && !holidays.find(h => h.date === toLocalYYYYMMDD(d)));
                let idx = 0;
                
                dutyDays.forEach(curDate => {
                    const dateStr = toLocalYYYYMMDD(curDate);
                    const forbidden = new Set();
                    for (let i = 1; i <= 8; i++) {
                        const checkD = new Date(curDate); checkD.setDate(checkD.getDate() - i);
                        const past = (schedule[toLocalYYYYMMDD(checkD)]?.team || []).join(' - ');
                        if (past) forbidden.add(past);
                    }
                    let assigned = false;
                    for (let a = 0; a < teams.length; a++) {
                        const cand = teams[idx];
                        if (!forbidden.has(cand)) { schedule[dateStr] = { ...(schedule[dateStr] || {}), team: cand.split(' - ') }; assigned = true; idx = (idx + 1) % teams.length; break; }
                        idx = (idx + 1) % teams.length;
                    }
                    if (!assigned) { schedule[dateStr] = { ...(schedule[dateStr] || {}), team: teams[idx].split(' - ') }; idx = (idx + 1) % teams.length; }
                });
                
                addToHistory("Geração", "Escala automática gerada.");
                renderCalendars(); 
            };
        }
    </script>
</body>
</html>
